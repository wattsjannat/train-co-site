<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <title>Mobeus Career | Find Your Perfect Role</title>
    <meta name="description" content="AI-powered career matching. Talk to Farah, your personal career coach, and discover roles that fit you perfectly." />
    <meta name="theme-color" content="#09090b" />

    <!-- Mobeus 2.0 SDK Configuration -->
    <script>
      // Mobeus 2.0 Platform Configuration
      window.UIFRAMEWORK_AUTO_INIT = false;
      window.UIFrameworkPreInitConfig = {
        widgetApiKey: import.meta.env.NEXT_PUBLIC_WIDGET_API_KEY || '',
        agentApiKey: import.meta.env.NEXT_PUBLIC_WIDGET_API_KEY || '',
        apiKey: import.meta.env.NEXT_PUBLIC_WIDGET_API_KEY || '',
        autoConnect: false,
        autoConnectAvatar: false,
        autoConnectVoice: false,
        waitForAvatarBeforeVoice: true,
        voiceUIVisible: false,
        muteByDefault: false,
        enableVoiceChat: true,
        enableAvatar: true,
        useAgentConfig: true,
        avatarID: '92329d89e4434e63b6260f9f374fffb0',
        voiceID: '8a4dfef7aacf4ad88c10ae9391bd3098',
        lightboard: {
          enabled: false,
        },
      };
      
      // Global Mobeus 2.0 API Keys
      window.MOBEUS_WIDGET_API_KEY = import.meta.env.NEXT_PUBLIC_WIDGET_API_KEY || '';
      window.AGENT_API_KEY = import.meta.env.NEXT_PUBLIC_WIDGET_API_KEY || '';
      window.MOBEUS_AVATAR_ID = '92329d89e4434e63b6260f9f374fffb0';
      window.MOBEUS_VOICE_ID = '8a4dfef7aacf4ad88c10ae9391bd3098';
      
      console.log('[Mobeus 2.0] Pre-init config with API key');
    </script>

    <!-- Mobeus 2.0 Internal Functions Bridge -->
    <script>
      (function registerMobeusSiteFunctions() {
        // Internal Mobeus SDK functions bridge
        // navigateToSection is patched at runtime by usePhaseFlow (React).
        const navigationBridge = {
          navigateToSection(data) {
            console.warn("[Mobeus 2.0] navigateToSection called before React initialized:", data);
            return false;
          },
        };

        const volumeBridge = {
          setVolume(level) {
            if (typeof level !== "number") return undefined;
            if (typeof window !== "undefined" && window.teleVolume && typeof window.teleVolume.setVolume === "function") {
              window.teleVolume.setVolume(level);
              return true;
            }
            return undefined;
          },
        };

        // MCP data bridge — placeholders patched at runtime by React
        const mcpBridge = {
          fetchJobs() { console.warn("[mcpBridge] fetchJobs called before React initialized"); return undefined; },
          fetchSkills() { console.warn("[mcpBridge] fetchSkills called before React initialized"); return undefined; },
          fetchCandidate() { console.warn("[mcpBridge] fetchCandidate called before React initialized"); return undefined; },
          fetchCareerGrowth() { console.warn("[mcpBridge] fetchCareerGrowth called before React initialized"); return undefined; },
          fetchMarketRelevance() { console.warn("[mcpBridge] fetchMarketRelevance called before React initialized"); return undefined; },
          cacheJobApplicants() { console.warn("[employerApplicantsCache] cacheJobApplicants called before React initialized"); return false; },
        };

        const existingRegistry =
          typeof window !== "undefined" && window.UIFrameworkSiteFunctions && typeof window.UIFrameworkSiteFunctions === "object"
            ? window.UIFrameworkSiteFunctions
            : {};

        window.UIFrameworkSiteFunctions = {
          ...existingRegistry,
          ...navigationBridge,
          ...volumeBridge,
          ...mcpBridge,
        };

        try {
          window.dispatchEvent(new CustomEvent("UIFrameworkSiteFunctionsReady", {
            detail: { registry: window.UIFrameworkSiteFunctions },
          }));
        } catch (e) {}
      })();
    </script>

    <!-- Employer Mode: Silent Microphone (for demo/testing) -->
    <script>
      (function () {
        window.__employerMode = false;
        var _origGUM = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
        navigator.mediaDevices.getUserMedia = function (constraints) {
          if (window.__employerMode && constraints && constraints.audio) {
            try {
              var ctx = new AudioContext();
              var dest = ctx.createMediaStreamDestination();
              return Promise.resolve(dest.stream);
            } catch (e) {
              return Promise.resolve(new MediaStream());
            }
          }
          return _origGUM(constraints);
        };
      })();
    </script>

    <!-- Mobeus 2.0 SDK (Tele Live Avatar) -->
    <script type="module" src="https://telecdn.s3.us-east-2.amazonaws.com/js/ui-framework-liveavatar.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
