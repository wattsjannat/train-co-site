version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      - NEXT_PUBLIC_DEV_TOOLBAR_HOST=${NEXT_PUBLIC_DEV_TOOLBAR_HOST:-localhost}
      - NEXT_PUBLIC_AGENT_NAME=${NEXT_PUBLIC_AGENT_NAME:-Trainco AI}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
